<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши игры | Vessel Horizon</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        page-title{
			text-align: center
		}
		body {
            background: #0a0a0a;
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(2px 2px at 20% 30%, #fff, rgba(255,255,255,0)),
                radial-gradient(2px 2px at 80% 70%, #fff, rgba(255,255,255,0));
            background-size: 200px 200px;
            opacity: 0.3;
            animation: stars 100s linear infinite;
        }
        
        @keyframes stars {
            from { background-position: 0 0; }
            to { background-position: -200px 200px; }
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
        }
        
        h1 {
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2em;
            transition: color 0.3s;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            transition: transform 0.3s;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .game-card:nth-child(1) { animation-delay: 0.1s; }
        .game-card:nth-child(2) { animation-delay: 0.3s; }
        .game-card:nth-child(3) { animation-delay: 0.5s; }
        
        .buy-button {
            background: #00f3ff;
            color: #0a0a0a;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
            margin-top: 15px;
        }
        
        .buy-button:hover {
            box-shadow: 0 0 15px #00f3ff;
        }
        
        max-width: 768px {
            nav {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .game-card {
                padding: 15px;
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <header>
        <h1>Vessel Horizon 🚀</h1>
        <nav>
            <a href="index.html">Главная</a>
            <a href="games.html">Игры</a>
            <a href="news.html">Новости</a>
            <a href="about.html">О нас</a>
            <a href="contacts.html">Контакты</a>
        </nav>
    </header>

    <main class="container">
        <h2 class="page-title">Наши игры</h2>
        
        <div class="game-card">
            <h3>Space Odyssey</h3>
            <p>Исследуйте галактики в роли капитана корабля</p>
            <a href="https://store.steampowered.com/app/2435980" class="buy-button" target="_blank">
				Купить за 1499 рублей
            </a>
        </div>
        
        <div class="game-card">
            <h3>Galactic Wars EX</h3>
            <p>Сразитесь за контроль над вселенной</p>
            <a href="https://store.steampowered.com/app/1844170" class="buy-button" target="_blank">
                Купить за 999 рублей
            </a>
        </div>
        
        <div class="game-card">
            <h3>World War I</h3>
            <p>Мировая война за человечество</p>
            <a href="https://store.steampowered.com/app/361380" class="buy-button" target="_blank">
                Купить за 899 рублей
            </a>
        </div>
    </main>
</body>
</html>
