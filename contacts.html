<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Vessel Horizon</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(2px 2px at 20% 30%, #fff, rgba(255,255,255,0)),
                radial-gradient(2px 2px at 80% 70%, #fff, rgba(255,255,255,0));
            background-size: 200px 200px;
            opacity: 0.3;
            animation: stars 100s linear infinite;
        }
        
        @keyframes stars {
            from { background-position: 0 0; }
            to { background-position: -200px 200px; }
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            position: relative;
            z-index: 1;
        }
        
        h1 {
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8em;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.7);
            margin-bottom: 20px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2em;
            transition: all 0.3s;
            position: relative;
        }
        
        nav a:hover {
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        
        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: #00f3ff;
            transition: width 0.3s;
        }
        
        nav a:hover::after {
            width: 100%;
        }
        
        /* Контактная секция */
        .contact-container {
            max-width: 1000px;
            margin: 40px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        
        .contact-form {
            flex: 1;
            min-width: 300px;
            padding: 30px;
            background: rgba(0, 243, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            backdrop-filter: blur(5px);
        }
        
        .contact-info {
            flex: 1;
            min-width: 300px;
            padding: 30px;
            background: rgba(0, 243, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            backdrop-filter: blur(5px);
        }
        
        /* Стили формы */
        .form-input {
            width: 92%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00f3ff;
            border-radius: 5px;
            color: white;
            font-family: 'Roboto', sans-serif;
        }
        
        .submit-btn {
            background: linear-gradient(45deg, #00f3ff, #0066ff);
            color: #0a0a0a;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .submit-btn:hover {
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
            transform: translateY(-2px);
        }
        
        /* Стили контактов */
        .contact-info h3 {
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .social-links a {
            color: #00f3ff;
            text-decoration: none;
            padding: 8px 15px;
            border: 1px solid #00f3ff;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .social-links a:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* Плавающие иконки */
        .floating-icon {
            position: fixed;
            font-size: 30px;
            opacity: 0.7;
            z-index: 0;
            pointer-events: none;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            will-change: transform;
        }
        
        
        @keyframes float-rocket {
            0% { transform: translate(10vw, 10vh) rotate(0deg); }
            25% { transform: translate(80vw, 20vh) rotate(90deg); }
            50% { transform: translate(60vw, 60vh) rotate(180deg); }
            75% { transform: translate(20vw, 40vh) rotate(270deg); }
            100% { transform: translate(10vw, 10vh) rotate(360deg); }
        }
		@keyframes float-ufo {
            0% { transform: translate(80vw, 60vh) rotate(0deg); }
            33% { transform: translate(20vw, 30vh) rotate(120deg); }
            66% { transform: translate(70vw, 70vh) rotate(240deg); }
            100% { transform: translate(80vw, 60vh) rotate(360deg); }
        }
        
        @keyframes float-alien {
            0% { transform: translate(20vw, 70vh) rotate(0deg); }
            50% { transform: translate(70vw, 30vh) rotate(180deg); }
            100% { transform: translate(20vw, 70vh) rotate(360deg); }
        }
        
        @keyframes float-planet {
            0% { transform: translate(70vw, 20vh) rotate(0deg); }
            50% { transform: translate(30vw, 50vh) rotate(180deg); }
            100% { transform: translate(70vw, 20vh) rotate(360deg); }
        }
        
        @keyframes float-satellite {
            0% { transform: translate(10vw, 50vh) rotate(0deg); }
            50% { transform: translate(60vw, 20vh) rotate(180deg); }
            100% { transform: translate(10vw, 50vh) rotate(360deg); }
        }
		.rocket { animation: float-rocket 25s infinite; }
        .ufo { animation: float-ufo 35s infinite; }
        .alien { animation: float-alien 30s infinite; }
        .planet { animation: float-planet 40s infinite; }
        .satellite { animation: float-satellite 45s infinite; }

        /* Адаптивность */
        max-width: 768px {
            .contact-container {
                flex-direction: column;
                gap: 20px;
                padding: 0 15px;
            }
            
            .contact-form, .contact-info {
                padding: 20px;
                margin: 0;
            }
            
            h1 {
                font-size: 2em;
            }
            
            nav {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
            
            .floating-icon {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <!-- Плавающие иконки (добавлены 5 разных иконок) -->
    <div class="floating-icon rocket" style="left:10vw;top:10vh">🚀</div>
    <div class="floating-icon ufo" style="left:80vw;top:60vh">🛸</div>
    <div class="floating-icon alien" style="left:20vw;top:70vh">👾</div>
    <div class="floating-icon planet" style="left:70vw;top:20vh">🪐</div>
    <div class="floating-icon satellite" style="left:10vw;top:50vh">🛰️</div>
    
    <header>
        <h1>Vessel Horizon 🚀</h1>
        <nav>
            <a href="index.html">Главная</a>
            <a href="games.html">Игры</a>
            <a href="news.html">Новости</a>
            <a href="about.html">О нас</a>
            <a href="contacts.html">Контакты</a>
        </nav>
    </header>

    <main class="contact-container">
        <section class="contact-form">
            <h2>Свяжитесь с нами</h2>
            <form id="emailjs-form">
                <input type="text" name="user_name" class="form-input" placeholder="Ваше имя" required>
                <input type="email" name="user_email" class="form-input" placeholder="Ваш email" required>
                <textarea name="message" class="form-input" rows="5" placeholder="Ваше сообщение..." required></textarea>
                <button type="submit" class="submit-btn" id="submit-btn">Отправить</button>
            </form>
        </section>
        
        <section class="contact-info">
            <h3>Наши контакты</h3>
            <p><strong>Email:</strong> <a href="mailto:support@vesselhorizon.com">support@vesselhorizon.com</a></p>
            <p><strong>Телефон:</strong> +7 (XXX) XXX-XX-XX</p>
            
            <div class="social-links">
                <a href="https://discord.gg/ваша_ссылка" target="_blank">Discord</a>
                <a href="https://twitter.com/ваша_ссылка" target="_blank">Twitter</a>
                <a href="https://store.steampowered.com/ваша_ссылка" target="_blank">Steam</a>
                <a href="https://vk.com/ваша_ссылка" target="_blank">VK</a>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
    // Инициализация плавающих иконок
    document.addEventListener('DOMContentLoaded', function() {
        // Устанавливаем начальные позиции
        const icons = [
            { element: document.querySelector('.rocket'), startX: 10, startY: 10 },
            { element: document.querySelector('.ufo'), startX: 80, startY: 60 },
            { element: document.querySelector('.alien'), startX: 20, startY: 70 },
            { element: document.querySelector('.planet'), startX: 70, startY: 20 },
            { element: document.querySelector('.satellite'), startX: 10, startY: 50 }
        ];

        // Функция для проверки границ
        function ensureVisible(element, x, y) {
            const rect = element.getBoundingClientRect();
            const vh = window.innerHeight;
            const vw = window.innerWidth;
            
            // Корректируем позиции, если выходят за пределы
            let newX = Math.min(x, 85); // Не больше 85vw
            let newY = Math.min(y, 85); // Не больше 85vh
            
            // Применяются корректировки
            element.style.left = newX + 'vw';
            element.style.top = newY + 'vh';
            
            return { x: newX, y: newY };
        }

        // Устанавливаются начальные позиции с проверкой
        icons.forEach(icon => {
            const pos = ensureVisible(icon.element, icon.startX, icon.startY);
            icon.x = pos.x;
            icon.y = pos.y;
        });

        // Инициализация EmailJS (замените на свои данные)
        emailjs.init('cUOjbUcz3YXYffp4n');
        
        // Обработка формы
        const contactForm = document.getElementById('emailjs-form');
        if (contactForm) {
            contactForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                if (!btn) return;
                
                btn.disabled = true;
                btn.textContent = 'Отправка...';
                
                emailjs.sendForm('service_j2ozsow', 'template_i09dpa7', this)
                    .then(() => {
                        alert('Сообщение отправлено!');
                        this.reset();
                    })
                    .catch((error) => {
                        alert('Ошибка отправки: ' + error.text);
                    })
                    .finally(() => {
                        btn.disabled = false;
                        btn.textContent = 'Отправить';
                    });
            });
        }

        // Динамическое добавление keyframes
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes float-rocket {
                0% { transform: translate(0, 0) rotate(0deg); }
                25% { transform: translate(70vw, 10vh) rotate(90deg); }
                50% { transform: translate(50vw, 50vh) rotate(180deg); }
                75% { transform: translate(10vw, 30vh) rotate(270deg); }
                100% { transform: translate(0, 0) rotate(360deg); }
            }
			
            
            @keyframes float-ufo {
                0% { transform: translate(0, 0) rotate(0deg); }
                33% { transform: translate(-50vw, 30vh) rotate(120deg); }
                66% { transform: translate(-20vw, -30vh) rotate(240deg); }
                100% { transform: translate(0, 0) rotate(360deg); }
            }
            
            @keyframes float-alien {
                0% { transform: translate(0, 0) rotate(0deg); }
                50% { transform: translate(50vw, -40vh) rotate(180deg); }
                100% { transform: translate(0, 0) rotate(360deg); }
            }
            
            @keyframes float-planet {
                0% { transform: translate(0, 0) rotate(0deg); }
                50% { transform: translate(-40vw, 30vh) rotate(180deg); }
                100% { transform: translate(0, 0) rotate(360deg); }
            }	
			@keyframes float-satellite {
                0% { transform: translate(0, 0) rotate(0deg); }
                50% { transform: translate(50vw, -20vh) rotate(180deg); }
                100% { transform: translate(0, 0) rotate(360deg); }
            }
        `;
        document.head.appendChild(style);
    });

    // Контроль границ при изменении размера окна
    window.addEventListener('resize', function() {
        const icons = document.querySelectorAll('.floating-icon');
        const vh = window.innerHeight;
        const vw = window.innerWidth;
        
        icons.forEach(icon => {
            const rect = icon.getBoundingClientRect();
            if (rect.bottom > vh) {
                icon.style.top = (vh - 50) + 'px';
            }
            if (rect.right > vw) {
                icon.style.left = (vw - 50) + 'px';
            }
        });
    });
</script>
</body>
</html>
